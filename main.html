<!doctype html>
<html lang="en">
  <head>
    <title>World Watch</title>
    <meta name="comp1800 template" content="My 1800 App" />
    <link rel="icon" type="image/x-icon" href="/images/WWicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Web Components for shared navbar and footer layout -->
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
    <script
      type="module"
      src="/src/components/site-party-list-items.js"
    ></script>
    <script type="module" src="/src/components/site-login-button.js"></script>

    <!-- Other libraries go here -->
  </head>

  <body>
    <!------------------------------>
    <!-- Your HTML Layout go here -->
    <!------------------------------>

    <!-- navbar goes here -->
    <site-navbar></site-navbar>

    <!-- Stuff for body goes here -->
    <main class="bg-light">
      <div
        class="container bg-slate-300 text-dark p-5 mb-3"
        style="
          width: 100vw;
          height: 700px;
          background: url(./images/pexels-semsibelli-26832707.jpg);
        "
      >
        <div class="container p-5">
          <h1 class="display-4 text-white p-3">
            Ready to find the perfect watch party, <span id="name-goes-here">friend?</span>
          </h1>
          <p class="display-6 text-white p-3">Watch your way</p>
          <a class="btn btn-primary p-3" href="index.html"
            >Find your perfect watch party >></a
          >
        </div>
      </div>

      <div
        id="carouselExampleRide"
        class="carousel slide mx-auto container"
        data-bs-ride="true"
      >
        <div class="carousel-inner rounded">
          <div class="carousel-item active">
            <img
              src="images/AM01.jpg"
              class="d-block w-100"
              height="400"
              alt="..."
            />
          </div>
          <div class="carousel-item">
            <img
              src="images/BBY01.jpg"
              class="d-block w-100"
              height="400"
              alt="..."
            />
            <!-- <site-party-list-item></site-party-list-item> -->
          </div>
          <div class="carousel-item">
            <img
              src="images/sadia-afreen-0ff2wEWSeTA-unsplash.jpg"
              class="d-block w-100"
              height="400"
              alt="..."
            />
            <!-- <site-party-list-items></site-party-list-items> -->
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselExampleRide"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselExampleRide"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>

      <div class="container m-5 bg-light rounded mx-auto">
        <h1>Newest Watch parties</h1>
        <div class="row flex-row flex-nowrap">
          <div class="col-sm p-2">
            <site-party-list-items></site-party-list-items>
            <div
              id="new-watch-parties"
              id="main-carousel"
              class="p-4 row flex-row flex-nowrap"
              style="overflow: auto; white-space: nowrap"
            ></div>
          </div>
        </div>
      </div>

      <div class="container m-5 bg-light rounded mx-auto">
        <h1>Upcoming Watch parties</h1>
        <div class="row flex-row flex-nowrap">
          <div class="col-sm p-2">
            <site-party-list-items></site-party-list-items>
            <div
              id="upcoming-watch-parties"
              id="main-carousel"
              class="p-4 row flex-row flex-nowrap"
              style="overflow: auto; white-space: nowrap"
            ></div>
          </div>
        </div>
      </div>

      <!-- <site-login-button></site-login-button> -->
    </main>

    <!-- footer goes here -->
    <footer class="container-fluid bg-light p-5">
      <h2 class="row justify-content-center">Have Any Questions?</h2>
      <div class="d-flex align-items-center justify-content-center">
        <img
          height="20px"
          src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fpngimg.com%2Fuploads%2Fphone%2Fphone_PNG48988.png&f=1&nofb=1&ipt=fa30e065acac9a59e4edb145aeef9d173ddba23f644bddeec3610f6ee652bd94"
        />
        <span class="p-2">604-777-777</span>
      </div>
      <div class="d-flex align-items-center justify-content-center">
        <img 
          height="20px"
          src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fvectorified.com%2Fimages%2Fblack-email-icon-png-6.png&f=1&nofb=1&ipt=3534663e70bac41d50629967e542268d3bfa93c1320353b6bc5690755164a168"
        />
        <span class="p-2">rigbycat@yahoo.com</span>
      </div>
      <br />
    </footer>
    <site-footer></site-footer>

    <!---------------------------------------------->
    <!-- Your own JavaScript functions go here    -->
    <!---------------------------------------------->

    <!-- Link to scripts of your own -->
    <script type="module" src="/src/app.js"></script>
    <script type="module" src="/src/landing-main.js"></script>
  </body>
</html>
