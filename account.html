<!doctype html>
<html lang="en">
  <head>
    <title>Account - World Watch</title>
    <meta name="comp1800 template" content="My 1800 App" />
    <link rel="icon" type="image/x-icon" href="/images/WWicon.png">

    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Web Components (src/components) -->
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
    <script
      type="module"
      src="/src/components/site-party-list-items.js"
    ></script>
    <script type="module" src="/src/components/site-login-button.js"></script>

    <!-- Other libraries go here -->
  </head>

  <body>
    <!------------------------------>
    <!-- Your HTML Layout go here -->
    <!------------------------------>

    <!-- navbar goes here -->
    <site-navbar></site-navbar>
    <br>

    <!-- Stuff for body goes here --> 
    <main class="p-2">
      <div class="parent container d-flex flex-column justify-content-center align-items-center h-100">
        <img class="child" src="../../images/WWPFP.png" height="250px" width="250px">
      </div>

      <div class="container" class="mx-auto" style="width: 368px;">
        <h1>User Profile </h1>
        <h5>Email: <span id="emailInput"></span></h5>
        <form>
            <fieldset class="mb-3" id="personalInfoFields" disabled>
                <div class="form-group">
                    <label >Name</label>
                    <input type="text" id="nameInput" class="form-control" placeholder="Enter your name">
                </div>
            </fieldset>
              <div class="d-flex d-flex justify-content-between mt-5">
                  <site-login-button></site-login-button>
                  <div class="my-auto">
                    <button id="editButton" type="button" class="btn btn-secondary">Edit</button>
                    <span style="width: 10px"></span>
                    <button id="saveButton" type="button" class="btn btn-primary">Save</button>
                  </div>

              </div>              

        </form>
      </div>


      <div class="container m-5 rounded mx-auto">
        <h1>Created Events</h1>
        <div class="row flex-row flex-nowrap">
          <div class="col-sm p-2">
            <site-party-list-items></site-party-list-items>
            <div id="created-watch-parties" id="main-carousel" class="p-4 row flex-row flex-nowrap" style="overflow: auto; white-space: nowrap;"></div>
          </div>
        </div>
      </div>

       <!-- <div class="container m-5 rounded mx-auto">
        <h1>Saved Events</h1>
        <div class="row flex-row flex-nowrap">
          <div class="col-sm p-2">
            <site-party-list-items></site-party-list-items>
            <div id="saved-watch-parties" id="main-carousel" class="p-4 row flex-row flex-nowrap" style="overflow: auto; white-space: nowrap;"></div>
          </div>
        </div>
      </div> -->

    </main>

    <!-- footer goes here -->
    <site-footer></site-footer>

    <!---------------------------------------------->
    <!-- Your own JavaScript functions go here    -->
    <!---------------------------------------------->

    <!-- Link to scripts of your own -->
    <script type="module" src="/src/app.js"></script>
    <!-- <script type="module" src="/src/main.js"></script> -->
    <script type="module" src="/src/profile.js"></script>
  </body>
</html>
