<!doctype html>
<html lang="en">
    <head>
    <title>Event Creation</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <!-- Web Components (src/components) -->
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
    <script type="module" src="/src/eventCreate.js"></script>
    <script type="module" src="/src/components/site-login-button.js"></script>

    <!-- Other libraries go here -->
    </head>

    <body>


    <!-- navbar goes here -->
    <site-navbar></site-navbar>

    <main>
    <!-- Event Creation -->
    <div id="eventCreate" class="">
        <h3 class="mb-3 text-center">Enter the details of your Watch Party!</h3>
        <form id="eventForm" novalidate class="">
            <div class="mb-3">
                <input
                    type="text"
                    id="eventHost"
                    class="form-control"
                    placeholder="Name of Venue"
                    aria-label="Venue"
                    required
                />
            </div>
            <div class="mb-3">
                <input
                    type="text"
                    id="eventAddress"
                    class="form-control"
                    placeholder="Address"
                    aria-label="Address"
                    required
                />
            </div>
            <div class="mb-3">
                <input
                    type="text"
                    id="team1"
                    class="form-control"
                    placeholder="Home Team"
                    required
                />
            </div><div class="mb-3">
                <input
                    type="text"
                    id="team2"
                    class="form-control"
                    placeholder="Away Team"
                    required
                />
            </div>
            <div class="mb-3">
                <input
                    type="text"
                    id="eventTime"
                    class="form-control"
                    placeholder="Start time of Watch Party"
                    required
                />
            </div>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" role="switch" id="eventPrivacy">
                <label class="form-check-label" for="switchCheckDefault">Public/Private</label>
            </div>
            <button type="submit" class="btn btn-success w-100">
            Create Event
            </button>
        </form>
    </div>
</main>

    <!-- footer goes here -->
    <site-footer></site-footer>

    <!---------------------------------------------->
    <!-- Your own JavaScript functions go here    -->
    <!---------------------------------------------->

    <!-- Link to scripts of your own -->
    <script type="module" src="/src/app.js"></script>
    <script type="module" src="/src/main.js"></script>
    </body>
</html>
